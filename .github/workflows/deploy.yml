name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: proven-airship-284111
  REGION: us-central1
  BACKEND_SERVICE: k2-spiral-backend
  FRONTEND_SERVICE: k2-spiral-frontend
  BACKEND_IMAGE: gcr.io/proven-airship-284111/k2-spiral-backend
  FRONTEND_IMAGE: gcr.io/proven-airship-284111/k2-spiral-frontend

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker --quiet

      - name: Build backend image
        run: docker build -t $BACKEND_IMAGE ./backend

      - name: Build frontend image
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=https://placeholder.run.app \
            -t $FRONTEND_IMAGE \
            ./frontend

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker to use gcloud credentials
        run: gcloud auth configure-docker --quiet

      # ── Backend ──────────────────────────────────────────────
      - name: Build and push backend image
        run: |
          docker build -t $BACKEND_IMAGE ./backend
          docker push $BACKEND_IMAGE

      - name: Deploy backend to Cloud Run
        run: |
          gcloud run deploy $BACKEND_SERVICE \
            --image $BACKEND_IMAGE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --timeout 300s \
            --memory 512Mi \
            --quiet

      - name: Get backend URL
        id: backend
        run: |
          URL=$(gcloud run services describe $BACKEND_SERVICE \
            --platform managed \
            --region $REGION \
            --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "Backend URL: $URL"

      # ── Frontend ─────────────────────────────────────────────
      - name: Build and push frontend image
        run: |
          docker build \
            --build-arg REACT_APP_API_URL=${{ steps.backend.outputs.url }} \
            -t $FRONTEND_IMAGE \
            ./frontend
          docker push $FRONTEND_IMAGE

      - name: Deploy frontend to Cloud Run
        run: |
          gcloud run deploy $FRONTEND_SERVICE \
            --image $FRONTEND_IMAGE \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --quiet

      - name: Print frontend URL
        run: |
          URL=$(gcloud run services describe $FRONTEND_SERVICE \
            --platform managed \
            --region $REGION \
            --format 'value(status.url)')
          echo "Frontend live at: $URL"
